<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Better Life AI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="auth-screen" class="screen">
        <div class="auth-box">
            <h1>Better Life</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Пароль">
            <div class="auth-buttons">
                <button id="btn-login">Войти</button>
                <button id="btn-register">Регистрация</button>
            </div>
        </div>
    </div>

    <div id="api-key-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Настройка ключей</h2>
            <p style="font-size: 14px; color: #555;">Для работы приложения требуются ключи Gemini из AI Studio. Они хранятся безопасно и используются только вами.</p>
            
            <div id="setup-regular-container" style="display: flex; flex-direction: column; gap: 5px;">
                <label style="font-size: 13px; font-weight: bold;">Обычный API ключ (для чата):</label>
                <input type="text" id="setup-regular-key" placeholder="AIzaSy...">
            </div>

            <div id="setup-master-container" style="display: flex; flex-direction: column; gap: 5px;">
                <label style="font-size: 13px; font-weight: bold;">Мастер-ключ (для памяти ИИ):</label>
                <input type="text" id="setup-master-key" placeholder="AIzaSy...">
            </div>

            <button id="btn-save-setup-keys" style="margin-top: 10px;">Сохранить и начать</button>
        </div>
    </div>

    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Настройки API Ключей</h2>
            
            <div class="settings-section" style="background: #f8f9fa; padding: 10px; border-radius: 5px; border: 1px solid #eee;">
                <h3 style="font-size: 15px; margin-bottom: 8px;">Мастер-ключ (Суммаризация)</h3>
                <small id="current-master-display" style="display: block; margin-bottom: 8px; font-family: monospace; color: #555; word-break: break-all;"></small>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="settings-master-key" style="flex-grow: 1;" placeholder="Заменить мастер-ключ...">
                    <button id="btn-update-master" style="background: #ff9800;">Обновить</button>
                </div>
            </div>

            <div class="settings-section" style="margin-top: 15px;">
                <h3 style="font-size: 15px; margin-bottom: 8px;">Обычные ключи (Чат)</h3>
                <div id="settings-keys-list"></div>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <input type="text" id="new-setting-key" placeholder="Новый обычный ключ..." style="flex-grow: 1;">
                    <button id="btn-add-setting-key">Добавить</button>
                </div>
            </div>

            <button id="btn-close-settings" style="background: #ccc; color: black; margin-top: 15px;">Закрыть</button>
        </div>
    </div>

    <div id="new-ai-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="ai-modal-title">Создать ИИ</h2>
            <input type="hidden" id="edit-ai-id">
            <input type="text" id="ai-name" placeholder="Имя (например: Диетолог)">
            <textarea id="ai-prompt" placeholder="Промпт: Ты опытный диетолог..." style="height: 100px; padding: 10px; border-radius: 5px; border: 1px solid #ccc;"></textarea>
            <button id="btn-save-ai">Сохранить</button>
            <button id="btn-close-ai" style="background: #ccc; color: black;">Отмена</button>
        </div>
    </div>

    <div id="app-screen" class="screen hidden">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Мои ИИ</h2>
                <div style="display: flex; gap: 8px;">
                    <button id="btn-settings" title="Настройки" style="background: #e4e6eb; color: black; padding: 5px 10px;">⚙️</button>
                    <button id="btn-new-ai" title="Создать ИИ" style="padding: 5px 12px;">+</button>
                    <button id="btn-logout" title="Выйти" style="background:#ff4d4d; padding: 5px 10px;">🚪</button>
                </div>
            </div>
            <ul id="ai-list"></ul>
        </div>
        
        <div class="chat-area">
            <div id="chat-header" style="display: flex; justify-content: space-between; align-items: center;">
                <span id="chat-header-text">Выберите ИИ для начала общения</span>
                <button id="btn-clear-chat" class="hidden" style="background: #ffeaeb; color: #ff4d4d; border: 1px solid #ffccd0; padding: 5px 12px; font-size: 13px; border-radius: 5px;">Очистить чат</button>
            </div>
            <div id="chat-messages"></div>
            <div class="chat-input-area hidden" id="chat-input-area">
                <input type="text" id="message-input" placeholder="Напишите сообщение...">
                <button id="btn-send">Отправить</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
