<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Better Life AI</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="auth-screen" class="screen">
        <div class="auth-box">
            <h1>Better Life</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Пароль">
            <div class="auth-buttons">
                <button id="btn-login">Войти</button>
                <button id="btn-register">Регистрация</button>
            </div>
        </div>
    </div>

    <div id="api-key-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Добавьте API ключи Gemini</h2>
            <p>Для работы нужен хотя бы один ключ (максимум 5).</p>
            <input type="text" id="api-key-input" placeholder="AIzaSy...">
            <button id="btn-add-key">Сохранить ключ</button>
            <ul id="keys-list"></ul>
            <button id="btn-finish-keys" class="hidden">Продолжить</button>
        </div>
    </div>

    <div id="app-screen" class="screen hidden">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Мои ИИ</h2>
                <button id="btn-logout" style="background:#ff4d4d; padding: 5px 10px;">Выйти</button>
                <button id="btn-new-ai">+</button>
            </div>
            <ul id="ai-list">
                </ul>
        </div>
        
        <div class="chat-area">
            <div id="chat-header">Выберите ИИ для начала общения</div>
            <div id="chat-messages"></div>
            <div class="chat-input-area hidden" id="chat-input-area">
                <input type="text" id="message-input" placeholder="Напишите сообщение...">
                <button id="btn-send">Отправить</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
